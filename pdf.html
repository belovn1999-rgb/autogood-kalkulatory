<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AUTOGOOD Umowa</title>
    <link rel="stylesheet" href="./src/pdf.css?v=20260605-1" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <a href="./" aria-label="AUTOGOOD Tools">
            <img src="./assets/autogood-logo.png" alt="AUTOGOOD" />
          </a>
          <span>Umowa</span>
        </div>
        <div class="actions">
          <label class="date-field">
            <span>Data</span>
            <input id="contractDate" type="date" />
          </label>
          <label class="sequence-field">
            <span>Nr</span>
            <input id="sequence" type="number" min="1" value="1" />
          </label>
          <button id="printBtn" class="primary-btn" type="button">PDF</button>
          <button id="generateBtn" class="secondary-top-btn" type="button">DOCX</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="paste-panel">
          <div class="section-title">Dane wejściowe</div>
          <textarea id="rawClient" spellcheck="false"></textarea>
          <div class="example-actions">
            <button id="resetBtn" class="ghost-btn" type="button">Wyzeruj</button>
          </div>
          <button id="parseBtn" class="secondary-btn" type="button">Rozpoznaj dane</button>
          <div id="status" class="status"></div>
        </aside>

        <section class="contract-grid">
          <div class="contract-card">
            <div class="card-head">ZLECENIODAWCA:</div>
            <div class="field-row client-kind">
              <label><input type="radio" name="clientType" value="person" checked /> <span>osoba</span></label>
              <label><input type="radio" name="clientType" value="company" /> <span>firma</span></label>
            </div>
            <label class="field">
              <span>Imię i Nazwisko/Nazwa:</span>
              <input id="clientName" type="text" />
            </label>
            <label class="checkbox-line">
              <input id="clientEntrepreneur" type="checkbox" />
              <span>Zleceniodawca jest przedsiębiorcą, zawiera umowę o charakterze zawodowym</span>
            </label>
            <label class="field">
              <span>Adres:</span>
              <input id="clientAddress" type="text" />
            </label>
            <label class="field">
              <span>PESEL/NIP:</span>
              <input id="clientIdentifier" type="text" />
            </label>
            <label class="field">
              <span>Rodzaj, numer i seria dokumentu tożsamości:</span>
              <input id="clientDocument" type="text" />
            </label>
            <div class="two-fields">
              <label class="field">
                <span>Nr. tel.:</span>
                <input id="clientPhone" type="text" />
              </label>
              <label class="field">
                <span>E-mail:</span>
                <input id="clientEmail" type="email" />
              </label>
            </div>

            <div class="card-head compact">PRZEDMIOT UMOWY:</div>
            <div class="checkbox-group">
              <label><input name="subject" type="radio" value="mediation" /> <span>1) wyszukanie ofert oraz pośrednictwo w zakupie</span></label>
              <label><input name="subject" type="radio" value="purchase_by_autogood" checked /> <span>2) wyszukanie ofert oraz zakup przez Zleceniobiorcę</span></label>
              <label><input name="subject" type="radio" value="financing" /> <span>3) zakup z finansowania</span></label>
              <label><input id="clientIndicatedVehicle" type="checkbox" /> <span>pojazd wskazany przez Zleceniodawcę</span></label>
            </div>

            <div class="card-head compact">BUDŻET NA ZAKUP</div>
            <div class="two-fields">
              <label class="field">
                <span>Budżet:</span>
                <div class="amount-control">
                  <input id="budgetTotal" type="text" inputmode="decimal" />
                  <select id="budgetCurrency" aria-label="Waluta budżetu">
                    <option value="PLN" selected>PLN</option>
                    <option value="EUR">EUR</option>
                  </select>
                </div>
              </label>
              <label class="field">
                <span>Zaliczka:</span>
                <div class="amount-control">
                  <input id="budgetAdvance" type="text" inputmode="decimal" />
                  <select id="advanceCurrency" aria-label="Waluta zaliczki">
                    <option value="PLN" selected>PLN</option>
                    <option value="EUR">EUR</option>
                  </select>
                </div>
              </label>
            </div>
          </div>

          <div class="contract-card">
            <div class="card-head">KRYTERIA POSZUKIWAŃ I ZAKUPU:</div>
            <label class="field">
              <span>Marka i model:</span>
              <input id="vehicleMakeModel" type="text" />
            </label>

            <div class="options-block">
              <div class="option-title">Dopuszczalne paliwo:</div>
              <label><input data-fuel="diesel" type="checkbox" /> diesel</label>
              <label><input data-fuel="benzyna" type="checkbox" /> benzyna</label>
              <label><input data-fuel="hybryda" type="checkbox" /> hybryda</label>
              <label><input data-fuel="elektryk" type="checkbox" /> elektryk</label>
            </div>

            <div class="options-block">
              <div class="option-title">Skrzynia biegów:</div>
              <label><input name="gearbox" type="radio" value="manualna" /> manualna</label>
              <label><input name="gearbox" type="radio" value="automatyczna" /> automatyczna</label>
            </div>

            <div class="options-block">
              <div class="option-title">Norma spalania euro:</div>
              <label><input name="euroStandard" type="radio" value="6" /> 6</label>
              <label><input name="euroStandard" type="radio" value="7" /> 7</label>
              <label><input name="euroStandard" type="radio" value="dowolna" /> dowolna</label>
              <label><input name="euroStandard" type="radio" value="inna" /> inna</label>
            </div>

            <div class="two-fields">
              <label class="field">
                <span>Wiek:</span>
                <input id="firstRegistration" type="text" />
              </label>
              <label class="field">
                <span>Przebieg do:</span>
                <input id="mileageTo" type="text" />
              </label>
            </div>

            <div class="options-block">
              <div class="option-title">Nadwozie:</div>
              <label><input name="bodyType" type="radio" value="sedan" /> sedan</label>
              <label><input name="bodyType" type="radio" value="kombi" /> kombi</label>
              <label><input name="bodyType" type="radio" value="coupe" /> coupe</label>
              <label><input name="bodyType" type="radio" value="inne" /> inne:</label>
              <input id="bodyOther" class="inline-input" type="text" />
            </div>

            <label class="checkbox-line">
              <input id="allowCollision" type="checkbox" />
              <span>dopuszczalne jest auto po kolizjach, ale bez uszkodzenia podłużnic</span>
            </label>

            <label class="field">
              <span>Dodatkowe wymagane cechy/wyposażenie:</span>
              <textarea id="requiredEquipment"></textarea>
            </label>
            <label class="field">
              <span>Dodatkowe oczekiwane cechy/wyposażenie:</span>
              <textarea id="expectedEquipment"></textarea>
            </label>
          </div>
        </section>
      </section>
    </main>
    <script src="./vendor/jszip.min.js"></script>
    <script src="./vendor/jspdf.umd.min.js"></script>
    <script src="./src/pdf.js?v=20260605-1"></script>
  </body>
</html>
